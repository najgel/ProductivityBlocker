<!DOCTYPE html>
<html style="width: 650px; min-height: 700px; margin: 0; padding: 0;">
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      width: 650px !important;
      min-height: 700px !important;
      margin: 0 !important;
      padding: 0 !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      color: #333;
      display: block !important;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    .container {
      width: 100%;
      min-height: 700px;
      padding: 20px;
      overflow-y: auto;
      display: block;
    }
    
    .header {
      color: white;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .input-section {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    
    input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      padding: 10px 18px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #5568d3;
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    .help-text {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }
    
    .list-section {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      margin-bottom: 20px;
    }
    
    .list-header {
      background: #f5f5f5;
      padding: 12px 15px;
      border-bottom: 1px solid #e0e0e0;
      font-weight: 600;
      font-size: 13px;
      color: #555;
    }
    
    .blocked-list {
      max-height: 250px;
      overflow-y: auto;
    }
    
    .blocked-item {
      padding: 12px 15px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    
    .blocked-item:hover {
      background: #f9f9f9;
    }
    
    .blocked-item:last-child {
      border-bottom: none;
    }
    
    .site-name {
      font-size: 14px;
      color: #333;
      word-break: break-all;
      flex: 1;
    }
    
    .remove-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-left: 10px;
      transition: background 0.2s;
    }
    
    .remove-btn:hover {
      background: #ee5a52;
    }
    
    .empty-state {
      padding: 30px 15px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }
    
    .stats-section {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      margin-bottom: 20px;
    }
    
    .stats-list {
      max-height: 350px;
      overflow-y: auto;
    }
    
    .stat-item {
      padding: 12px 15px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    
    .stat-item:hover {
      background: #f9f9f9;
    }
    
    .stat-item:last-child {
      border-bottom: none;
    }
    
    .stat-info {
      flex: 1;
    }
    
    .stat-domain {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }
    
    .stat-bar {
      background: #f0f0f0;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    
    .stat-bar-fill {
      background: linear-gradient(90deg, #667eea, #764ba2);
      height: 100%;
      transition: width 0.3s;
    }
    
    .stat-visits {
      font-size: 12px;
      color: #999;
    }
    
    .block-from-stats {
      background: #667eea;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-left: 10px;
      transition: background 0.2s;
    }
    
    .block-from-stats:hover {
      background: #5568d3;
    }
    
    .block-from-stats.already-blocked {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .empty-state-icon {
      font-size: 32px;
      margin-bottom: 10px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚫 Productivity Blocker</h1>
      <p>Stay focused, block distractions</p>
    </div>
    
    <div class="input-section">
      <div class="input-group">
        <input 
          type="text" 
          id="siteInput" 
          placeholder="e.g., reddit.com, twitter.com"
        >
        <button id="addBtn">Add</button>
      </div>
      <div class="help-text">
        ℹ️ Enter domain names (e.g., facebook.com). Subdomains are automatically blocked.
      </div>
    </div>

    <div class="stats-section">
      <div class="list-header">📊 Your Top Sites (Last 7 Days)</div>
      <div class="stats-list" id="statsList">
        <div class="empty-state">
          <div class="empty-state-icon">⏳</div>
          <div>Loading your browsing data...</div>
        </div>
      </div>
    </div>
    
    <div class="list-section">
      <div class="list-header">Blocked Sites</div>
      <div class="blocked-list" id="blockedList">
        <div class="empty-state">
          <div class="empty-state-icon">✓</div>
          <div>No sites blocked yet. Add one to get started!</div>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
